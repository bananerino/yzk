<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orosz</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="mode-selector">
        <button class="mode-btn active" data-mode="quiz">Kvíz</button>
        <button class="mode-btn" data-mode="cards">Kártyák</button>
      </div>

      <div class="filter-buttons">
        <button class="filter-btn active" data-filter="all">Összes</button>
        <button class="filter-btn" data-filter="verb">Ige</button>
        <button class="filter-btn" data-filter="noun">Főnév</button>
        <button class="filter-btn" data-filter="adjective">Melléknév</button>
        <button class="filter-btn" data-filter="other">Egyéb</button>
      </div>

      <div class="quiz-section">
        <div class="word-display">
          <div class="word" id="word"></div>
          <div class="meta">
            <span class="type" id="wordType"></span>
          </div>
          <div class="feedback" id="feedback"></div>
        </div>

        <div class="translations-section">
          <h3>Translations:</h3>
          <ul class="translations" id="translations"></ul>
        </div>

        <form id="answerForm">
          <div class="form-group">
            <label for="answer1">Szó</label>
            <input
              type="text"
              id="answer1"
              placeholder="Type Latin characters (e.g., zhivoy, koshka)"
              autocomplete="off"
            />
            <div class="preview" id="preview1"></div>
          </div>

          <div class="form-group" id="verbForm2Group" style="display: none">
            <label for="answer2">Befejezett:</label>
            <input
              type="text"
              id="answer2"
              placeholder="Befejezett"
              autocomplete="off"
            />
            <div class="preview" id="preview2"></div>
          </div>

          <div class="button-group">
            <button type="button" class="btn btn-secondary" id="hintBtn">
              Hint
            </button>
            <button type="button" class="btn btn-secondary" id="showWordBtn">
              Show Word
            </button>
            <button type="submit" class="btn btn-primary">Check</button>
            <button type="button" class="btn btn-secondary" id="newWordBtn">
              New Word
            </button>
          </div>
        </form>

        <div class="usage-section" id="usageSection" style="display: none">
          <h3>Usage:</h3>
          <p class="usage" id="usage"></p>
        </div>
      </div>

      <div class="cards-section" style="display: none">
        <div class="card">
          <div class="card-word" id="cardWord"></div>
          <div class="card-type" id="cardType"></div>

          <div class="card-translations">
            <h4>Translations:</h4>
            <ul class="card-translations-list" id="cardTranslations"></ul>
          </div>

          <div class="card-usage" id="cardUsageSection" style="display: none">
            <h4>Usage:</h4>
            <p class="card-usage-text" id="cardUsage"></p>
          </div>

          <div
            class="card-verb-forms"
            id="cardVerbSection"
            style="display: none"
          >
            <h4>Verb Forms:</h4>
            <div class="verb-forms-display">
              <div class="verb-form">
                <span class="verb-label">Imperfective:</span>
                <span class="verb-value" id="cardImperfective"></span>
              </div>
              <div class="verb-form">
                <span class="verb-label">Perfective:</span>
                <span class="verb-value" id="cardPerfective"></span>
              </div>
            </div>
          </div>

          <div class="card-hint">
            Press <strong>Space</strong> or <strong>Enter</strong> for next word
          </div>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
